<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RailSignal Lite - Sector Control</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed-dim": "#abd600",
                        "inverse-surface": "#e5e2e1",
                        "on-primary-fixed": "#161e00",
                        "secondary-fixed-dim": "#ffba20",
                        "primary-container": "#c3f400",
                        "on-secondary-container": "#6b4b00",
                        "surface-container-high": "#2a2a2a",
                        "surface-tint": "#abd600",
                        "on-secondary": "#412d00",
                        "primary-fixed": "#c3f400",
                        "surface": "#131313",
                        "on-surface": "#e5e2e1",
                        "secondary-fixed": "#ffdea8",
                        "tertiary-container": "#ffdad5",
                        "secondary-container": "#feb700",
                        "tertiary": "#ffffff",
                        "on-surface-variant": "#c4c9ac",
                        "on-primary-container": "#556d00",
                        "surface-dim": "#131313",
                        "tertiary-fixed-dim": "#ffb4aa",
                        "on-tertiary-container": "#ca0a0f",
                        "outline-variant": "#444933",
                        "background": "#131313",
                        "on-error": "#690005",
                        "secondary": "#ffdb9d",
                        "tertiary-fixed": "#ffdad5",
                        "error-container": "#93000a",
                        "on-tertiary-fixed": "#410001",
                        "inverse-on-surface": "#313030",
                        "outline": "#8e9379",
                        "on-secondary-fixed": "#271900",
                        "on-secondary-fixed-variant": "#5e4200",
                        "on-background": "#e5e2e1",
                        "surface-variant": "#353534",
                        "on-tertiary": "#690003",
                        "surface-container": "#201f1f",
                        "error": "#ffb4ab",
                        "on-primary": "#283500",
                        "on-primary-fixed-variant": "#3c4d00",
                        "surface-bright": "#393939",
                        "inverse-primary": "#506600",
                        "surface-container-highest": "#353534",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-lowest": "#0e0e0e",
                        "on-error-container": "#ffdad6",
                        "primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#930005"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "margin-mobile": "20px",
                        "unit": "4px",
                        "gutter": "16px",
                        "grid-cols": "12",
                        "margin-desktop": "64px"
                    },
                    fontFamily: {
                        "body-base": ["Inter"],
                        "display-lg": ["JetBrains Mono"],
                        "display-lg-mobile": ["JetBrains Mono"],
                        "headline-md": ["JetBrains Mono"],
                        "stats-num": ["JetBrains Mono"],
                        "label-caps": ["JetBrains Mono"]
                    },
                    fontSize: {
                        "body-base": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "1.1", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "stats-num": ["20px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Grid Background Pattern */
        .grid-bg {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(68, 73, 51, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(68, 73, 51, 0.1) 1px, transparent 1px);
        }

        /* Signal Glows */
        .glow-active {
            box-shadow: 0 0 12px rgba(171, 214, 0, 0.6);
            border-color: #abd600 !important;
        }
        
        .glow-warning {
            box-shadow: 0 0 12px rgba(255, 186, 32, 0.6);
            border-color: #ffba20 !important;
        }

        .track-line {
            background-color: #2a2a2a;
            border-top: 1px solid #353534;
            border-bottom: 1px solid #353534;
            transition: all 0.3s ease;
        }

        .track-line.active {
            background-color: rgba(171, 214, 0, 0.2);
            border-color: #abd600;
            box-shadow: 0 0 8px rgba(171, 214, 0, 0.3);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col overflow-hidden select-none">
<!-- TopAppBar (Based on Shared Components JSON) -->
<header class="fixed top-0 w-full h-16 bg-surface-container-lowest/80 backdrop-blur-md border-b border-outline-variant shadow-[0_0_15px_rgba(171,214,0,0.1)] flex justify-between items-center px-margin-mobile md:px-margin-desktop z-50">
<!-- Brand -->
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">train</span>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary-fixed-dim uppercase italic tracking-tighter">RAILSIGNAL LITE</h1>
</div>
<!-- HUD Center Stats -->
<div class="hidden md:flex items-center gap-8 bg-surface-container-high px-6 py-2 rounded border border-outline-variant">
<div class="flex flex-col items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">SCORE</span>
<span class="font-stats-num text-stats-num text-on-background">1,240</span>
</div>
<div class="w-px h-8 bg-outline-variant"></div>
<div class="flex flex-col items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">LEVEL</span>
<span class="font-stats-num text-stats-num text-primary-fixed-dim">04</span>
</div>
</div>
<!-- Trailing Action -->
<button class="flex items-center justify-center w-10 h-10 rounded bg-surface-container-high border border-outline-variant text-primary-fixed-dim hover:border-primary-fixed-dim hover:shadow-[0_0_8px_#abd60066] active:translate-y-px transition-all duration-200">
<span class="material-symbols-outlined" data-icon="pause">pause</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 mt-16 flex relative">
<!-- Playfield Canvas -->
<div class="flex-1 relative grid-bg bg-surface overflow-hidden" id="playfield">
<!-- Safe Zone Wrapper -->
<div class="absolute inset-0 m-margin-mobile md:m-margin-desktop border border-outline-variant/30 rounded-lg">
<!-- Stylized Neon Rail Tracks (SVG/CSS Hybrid) -->
<!-- Main Line -->
<div class="absolute top-1/2 left-0 right-0 h-4 -translate-y-1/2 track-line active"></div>
<!-- Branch Line Top -->
<div class="absolute top-[20%] left-[30%] right-[10%] h-4 track-line transform -skew-x-[45deg] origin-left"></div>
<!-- Branch Line Bottom -->
<div class="absolute bottom-[25%] left-[45%] right-0 h-4 track-line"></div>
<!-- Vertical Connector -->
<div class="absolute top-[20%] bottom-1/2 left-[60%] w-4 track-line"></div>
<!-- Junction Nodes (Interactive) -->
<button class="junction-node absolute top-1/2 left-[30%] w-8 h-8 -mt-4 -ml-4 rounded-full bg-surface-container-highest border-2 border-outline-variant flex items-center justify-center hover:border-primary-fixed-dim hover:bg-surface-container-high transition-all group z-10">
<div class="w-3 h-3 rounded-full bg-outline-variant group-hover:bg-primary-fixed-dim transition-colors"></div>
</button>
<button class="junction-node glow-active absolute top-1/2 left-[60%] w-8 h-8 -mt-4 -ml-4 rounded-full bg-surface-container-high border-2 flex items-center justify-center hover:shadow-[0_0_12px_#abd600] active:scale-95 transition-all group z-10" data-state="active">
<div class="w-3 h-3 rounded-full bg-primary-fixed-dim"></div>
</button>
<button class="junction-node glow-warning absolute top-[20%] left-[60%] w-8 h-8 -mt-4 -ml-4 rounded-full bg-surface-container-high border-2 flex items-center justify-center hover:shadow-[0_0_12px_#ffba20] active:scale-95 transition-all group z-10" data-state="warning">
<div class="w-3 h-3 rounded-full bg-secondary-fixed-dim"></div>
</button>
<!-- Signal Pulses (Visual Elements) -->
<div class="absolute top-1/2 left-[10%] w-16 h-4 -mt-2 bg-gradient-to-r from-transparent via-primary-fixed-dim to-transparent opacity-80 animate-pulse"></div>
</div>
</div>
<!-- Right Status Panel -->
<aside class="hidden lg:flex w-[280px] bg-surface-container-low border-l border-outline-variant flex-col py-8 px-gutter relative z-20">
<h2 class="font-headline-md text-headline-md text-on-background tracking-tighter mb-8 border-b border-outline-variant pb-4">TELEMETRY</h2>
<div class="flex flex-col gap-6">
<!-- Status Block -->
<div class="bg-surface-container-highest border border-outline-variant p-4 rounded">
<h3 class="font-label-caps text-label-caps text-on-surface-variant mb-2">SYSTEM STATUS</h3>
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-primary-fixed-dim shadow-[0_0_8px_#abd600]"></div>
<span class="font-stats-num text-stats-num text-primary-fixed-dim">ACTIVE</span>
</div>
</div>
<!-- Next Pulse Timer -->
<div class="bg-surface-container-highest border border-outline-variant p-4 rounded relative overflow-hidden">
<div class="absolute bottom-0 left-0 h-1 bg-secondary-fixed-dim w-[60%] transition-all duration-1000"></div>
<h3 class="font-label-caps text-label-caps text-on-surface-variant mb-2">NEXT PULSE</h3>
<span class="font-stats-num text-[32px] font-bold text-on-background leading-none">2.5s</span>
</div>
<!-- Junction Health List -->
<div class="flex flex-col gap-2 mt-4">
<h3 class="font-label-caps text-label-caps text-on-surface-variant mb-2">JUNCTION HEALTH</h3>
<div class="flex justify-between items-center py-2 border-b border-outline-variant/50">
<span class="font-body-base text-body-base text-on-background">J-Alpha</span>
<span class="font-stats-num text-label-caps text-primary-fixed-dim">100%</span>
</div>
<div class="flex justify-between items-center py-2 border-b border-outline-variant/50">
<span class="font-body-base text-body-base text-on-background">J-Beta</span>
<span class="font-stats-num text-label-caps text-secondary-fixed-dim">78%</span>
</div>
<div class="flex justify-between items-center py-2 border-b border-outline-variant/50">
<span class="font-body-base text-body-base text-on-background">J-Gamma</span>
<span class="font-stats-num text-label-caps text-primary-fixed-dim">95%</span>
</div>
</div>
</div>
<!-- Terminal Log Effect -->
<div class="mt-auto pt-8">
<div class="h-24 bg-surface rounded border border-outline-variant p-2 font-display-lg text-[10px] text-on-surface-variant opacity-70 overflow-hidden flex flex-col justify-end">
<div>&gt; Init sequence... OK</div>
<div>&gt; Routing power to track 4... OK</div>
<div class="text-primary-fixed-dim">&gt; Signal locked. Awaiting input.</div>
</div>
</div>
</aside>
</main>
<!-- Floating Bottom Controls -->
<div class="fixed bottom-margin-mobile md:bottom-margin-desktop left-1/2 -translate-x-1/2 flex items-center gap-4 bg-surface-container-highest/90 backdrop-blur-md px-6 py-4 rounded-xl border border-outline-variant shadow-[0_4px_24px_rgba(0,0,0,0.5)] z-50">
<button class="flex items-center gap-2 px-6 py-2 bg-surface-container-low border border-outline-variant hover:border-primary-fixed-dim hover:text-primary-fixed-dim text-on-surface-variant font-label-caps text-label-caps rounded transition-all active:translate-y-px">
<span class="material-symbols-outlined text-[18px]">settings</span>
            SETTINGS
        </button>
<button class="flex items-center justify-center gap-2 px-10 py-3 bg-primary-fixed-dim text-on-primary-fixed font-headline-md text-[18px] rounded border border-transparent hover:shadow-[0_0_15px_#abd600] active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
            START GAME
        </button>
<button class="flex items-center gap-2 px-6 py-2 bg-surface-container-low border border-outline-variant hover:border-error hover:text-error text-on-surface-variant font-label-caps text-label-caps rounded transition-all active:translate-y-px">
<span class="material-symbols-outlined text-[18px]">refresh</span>
            RESTART
        </button>
</div>
<script>
        // Simple interaction script to toggle junction states for visual feedback
        document.querySelectorAll('.junction-node').forEach(node => {
            node.addEventListener('click', function() {
                const currentState = this.getAttribute('data-state');
                const innerDot = this.querySelector('div');
                
                // Reset classes
                this.className = 'junction-node absolute w-8 h-8 -mt-4 -ml-4 rounded-full border-2 flex items-center justify-center transition-all group z-10 active:scale-95';
                
                // Copy position classes (simplistic approach for demo)
                const styleArray = this.getAttribute('style') || '';
                const classes = Array.from(this.classList);
                
                if (currentState === 'active') {
                    // Switch to warning
                    this.setAttribute('data-state', 'warning');
                    this.classList.add('glow-warning', 'bg-surface-container-high');
                    innerDot.className = 'w-3 h-3 rounded-full bg-secondary-fixed-dim';
                } else if (currentState === 'warning') {
                    // Switch to inactive
                    this.setAttribute('data-state', 'inactive');
                    this.classList.add('bg-surface-container-highest', 'border-outline-variant', 'hover:border-primary-fixed-dim', 'hover:bg-surface-container-high');
                    innerDot.className = 'w-3 h-3 rounded-full bg-outline-variant group-hover:bg-primary-fixed-dim transition-colors';
                } else {
                    // Switch to active
                    this.setAttribute('data-state', 'active');
                    this.classList.add('glow-active', 'bg-surface-container-high');
                    innerDot.className = 'w-3 h-3 rounded-full bg-primary-fixed-dim';
                }
                
                // Re-apply absolute positioning classes (hacky but works for this static layout)
                if(this.parentElement.children[4] === this) this.classList.add('top-1/2', 'left-[30%]');
                if(this.parentElement.children[5] === this) this.classList.add('top-1/2', 'left-[60%]');
                if(this.parentElement.children[6] === this) this.classList.add('top-[20%]', 'left-[60%]');
            });
        });
    </script>
</body></html>
